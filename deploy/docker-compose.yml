services:
  app:
    container_name: anicetus-app
    build:
      context: ..
    volumes: 
      - ../.:/app
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - anicetus
  db:
    container_name: anicetus-db
    image: postgres:16.3-alpine3.20
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5400:5432"
    volumes:
      - postgres:/data/postgres
    networks:
      - anicetus
  
  valkey:
    container_name: anicetus-valkey
    image: valkey/valkey:8.1-alpine3.21
    ports:
      - "6379:6379" 
    volumes:
      - valkey_data:/data
    restart: always
    networks:
      - anicetus

  # TODO: Fix hot reload for dashboard
  # dashboard:
  #   container_name: dashboard
  #   build:
  #     context: ..
  #   ports:
  #     - "8081:8081"
  #   networks:
  #     - anicetus

volumes:
  postgres:
  valkey_data:

networks:
  anicetus:
    external: true